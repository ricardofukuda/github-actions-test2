name: build

on:
  push:
    branches:
      - master

jobs:
  tests:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: false
          file: DockerfileTest
          context: .
          tags: app-test:latest
      - name: Run tests
        run: docker run --rm app-test:latest
  build:
    runs-on: ubuntu-24.04
    needs: tests
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: false
          file: Dockerfile
          context: .
          tags: app:latest
