name: build

on:
  push:
    branches:
      - master

jobs:
  build:
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: false
          context: .
          tags: app:latest
